<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Favorites</title>
<style>
body { background:#E8EEF3; font-family:sans-serif; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px;}
img { width:100%; border-radius:8px;}
</style>
</head>
<body>

<a href="index.html">← Back</a>
<div id="app"></div>

<script>
function render(){
  const data = JSON.parse(localStorage.getItem("favorites")||"[]");

  if(!data.length){
    app.innerHTML="まだ保存されていません";
    return;
  }

  app.innerHTML = `<div class="grid">${
    data.map(p=>`<img src="${p.url}">`).join("")
  }</div>`;
}
render();
</script>

</body>
</html>
