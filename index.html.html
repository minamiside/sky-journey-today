<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8EEF3">
  <meta name="description" content="空を見るためだけの、静かなアプリ">
  <title>Sky Journey Today</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="logo" href="#" id="logoLink">
      <span>✈</span> Sky Journey Today
    </a>
    <nav>
      <a href="#" id="navFavorites">Favorites</a>
      <a href="#" id="navAbout">About</a>
    </nav>
  </header>

  <!-- MAIN PAGE -->
  <main id="page-main">

    <!-- スライダー -->
    <section class="slider-section">
      <div class="slider-wrapper" id="sliderWrapper">
        <div class="slider-track" id="sliderTrack"></div>
        <button class="slide-arr slide-arr--prev" id="prevBtn" aria-label="前へ">&#8592;</button>
        <button class="slide-arr slide-arr--next" id="nextBtn" aria-label="次へ">&#8594;</button>
      </div>
      <div class="slider-controls">
        <div class="dots" id="dots"></div>
      </div>
      <p class="swipe-hint">swipe to explore</p>
      <button class="refresh-btn" id="refreshBtn">↺ &nbsp; refresh sky</button>
    </section>

    <div class="spacer"><div class="spacer-line"></div></div>

    <!-- 今日のひとこと -->
    <section class="today-section" id="todaySection">
      <!-- injected by JS -->
    </section>

    <div class="spacer"><div class="spacer-line"></div></div>

    <!-- スクロール名言 -->
    <section class="quotes-section" id="quotesSection">
      <!-- injected by JS -->
    </section>

  </main>

  <!-- FAVORITES PAGE -->
  <div id="page-favorites">
    <div class="page-header">
      <h2>Favorites</h2>
      <p>saved skies</p>
    </div>
    <div class="fav-grid" id="favGrid"></div>
  </div>

  <!-- ABOUT PAGE -->
  <div id="page-about">
    <div class="about-content">
      <h2>空を見るためだけの、<br>静かなアプリ。</h2>
      <p>Sky Journey Today は、情報でもSNSでもなく、<br>ただ空を眺めるための場所です。</p>
      <p>朝焼け、ブルーアワー、夕暮れ——<br>世界のどこかの空の断片を、静かに届けます。</p>
      <p>スクロールして、息をして、空を見てください。</p>
      <div class="about-tags">
        <span class="tag">blue hour</span>
        <span class="tag">dawn</span>
        <span class="tag">twilight</span>
        <span class="tag">sunset</span>
        <span class="tag">minimal</span>
        <span class="tag">quiet</span>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&#215;</button>
    <img id="lightboxImg" src="" alt="sky">
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
